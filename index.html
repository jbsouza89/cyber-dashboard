<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .label {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .section-title {
      margin: 32px 0 16px;
      font-size: 20px;
    }

    .track {
      margin-bottom: 16px;
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar-fill {
      height: 100%;
      background: #22c55e;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #1e293b;
      padding: 14px;
      border-radius: 10px;
    }

    .error {
      color: #f87171;
      font-weight: bold;
    }

    .loading {
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cybersecurity Dashboard</h1>
    <p class="subtitle">Visualização simples consumindo sua API FastAPI</p>

    <p id="status" class="loading">Carregando dados...</p>

    <div id="dashboard" style="display:none;">
      <div class="cards">
        <div class="card">
          <div class="label">Aluno</div>
          <div class="value" id="userName">-</div>
        </div>

        <div class="card">
          <div class="label">Progresso geral</div>
          <div class="value" id="overallProgress">-</div>
        </div>

        <div class="card">
          <div class="label">XP</div>
          <div class="value" id="xp">-</div>
        </div>

        <div class="card">
          <div class="label">Controles CIS cobertos</div>
          <div class="value" id="cisCoverage">-</div>
        </div>
      </div>

      <h2 class="section-title">Trilhas</h2>
      <div id="tracks"></div>

      <h2 class="section-title">Próximos desafios</h2>
      <div id="challenges" class="list"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://cyber-dashboard-6a64.onrender.com";
    const USER_ID = "123";

    async function loadDashboard() {
      const status = document.getElementById("status");
      const dashboard = document.getElementById("dashboard");

      try {
        const response = await fetch(`${API_BASE}/api/dashboard/${USER_ID}`);

        if (!response.ok) {
          throw new Error(`Erro HTTP: ${response.status}`);
        }

        const data = await response.json();

        document.getElementById("userName").textContent = data.user.name;
        document.getElementById("overallProgress").textContent =
          Math.round(data.summary.overallProgress * 100) + "%";
        document.getElementById("xp").textContent = data.summary.xp;
        document.getElementById("cisCoverage").textContent =
          data.frameworkCoverage[0].controlsCovered + "/" + data.frameworkCoverage[0].controlsTotal;

        const tracksEl = document.getElementById("tracks");
        tracksEl.innerHTML = "";

        data.tracks.forEach(track => {
          const percent = Math.round(track.progress * 100);

          const el = document.createElement("div");
          el.className = "track";
          el.innerHTML = `
            <strong>${track.name}</strong>
            <div>${percent}% concluído</div>
            <div class="bar">
              <div class="bar-fill" style="width: ${percent}%"></div>
            </div>
          `;
          tracksEl.appendChild(el);
        });

        const challengesEl = document.getElementById("challenges");
        challengesEl.innerHTML = "";

        data.recommendedChallenges.forEach(challenge => {
          const el = document.createElement("div");
          el.className = "item";
          el.innerHTML = `
            <strong>${challenge.name}</strong><br>
            Plataforma: ${challenge.platform}<br>
            Motivo: ${challenge.reason}<br>
            Dificuldade: ${challenge.difficulty}
          `;
          challengesEl.appendChild(el);
        });

        status.style.display = "none";
        dashboard.style.display = "block";
      } catch (error) {
        status.className = "error";
        status.textContent = "Erro ao carregar dashboard: " + error.message;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
